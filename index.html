<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Clinic Management System</title>
  </head>
  <body>

    <div class="top-panel">
      <img class="logo" src="assets/QCU_Logo_2019.png" alt="Qcu Logo">
      <h3 class="heading"> CLINIC MANAGEMENT SYSTEM</h3>
    </div>

    <div class="down-panel"></div>

    <div class="login-container">
      <label for="username-tb">Username</label>
      <input type="text" name="Username" id="username-tb">
      <label for="password-tb">Password</label>
      <input type="text" name="Password" id="password-tb">
      <button class="login-btn">Login</button>
      <p>Have an account?</p>
      <a href="#signup" class="hyperlink">Register here</a>
      <a href="#forget-password" class="hyperlink">Forget Password</a>
    </div>

</body>
</html>
